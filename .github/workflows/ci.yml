name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # full install: the suite deps are git-hosted; tsx + the MCP SDK are on npm
      - run: npm install --no-audit --no-fund
      - run: npm test
