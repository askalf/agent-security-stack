# Dogfood: the stack pins its own MCP tool surface. mcp-manifest.json is the
# server's real tools/list response (support/dump-tools.mjs), pinned in
# truecopy.lock. The chain: code -> manifest (--check) -> lock (verify).
# Changing a tool name, description, or schema — or a dep bump that changes
# the generated schemas — fails this gate until consciously re-pinned.
name: truecopy gate

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions: read-all

jobs:
  verify:
    name: verify pinned tool surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
      - run: npm ci --no-audit --no-fund
      - name: manifest matches the live tool surface
        run: node support/dump-tools.mjs --check
      - name: truecopy verify
        uses: askalf/truecopy-action@5c6fcf00edb83ff4846206392722292d45fee227 # v1.0.1
